apiVersion: apps/v1
kind: Deployment
metadata:
  name: remediation-service
  labels:
    app: remediation-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: remediation-service
  template:
    metadata:
      labels:
        app: remediation-service
    spec:
      serviceAccountName: remediation-sa
      containers:
        - name: remediation-service
          image: remediation-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 20
